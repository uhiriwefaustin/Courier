{% extends 'crud/list.html' %}
{% block list_columns %}
<td class="px-4 py-3 fw-bold">{{ item.payment_id }}</td>
<td class="px-4 py-3"><a href="{% url 'package_list' %}" class="text-decoration-none">#{{ item.package.package_id }}</a></td>
<td class="px-4 py-3 text-success fw-bold">${{ item.amount }}</td>
<td class="px-4 py-3">{{ item.payment_method }}</td>
<td class="px-4 py-3">{{ item.payment_date|date:"M d, Y" }}</td>
{% endblock %}
