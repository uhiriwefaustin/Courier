{% extends 'base.html' %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h2 class="mb-4 text-primary-custom fw-bold">Dashboard</h2>
<div class="card shadow-sm mb-4">
    <div class="card-body text-center py-5">
        <i class="bi bi-person-badge text-muted mb-3" style="font-size: 4rem;"></i>
        <h4 class="fw-bold">Welcome, {{ user.username }}</h4>
        <p class="text-muted">Your account role is yet to be assigned or a dashboard is not available for your role.</p>
    </div>
</div>
{% endblock %}
