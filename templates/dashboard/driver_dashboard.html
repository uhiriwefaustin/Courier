{% extends 'base.html' %}
{% block title %}Driver Dashboard{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary-custom fw-bold"><i class="bi bi-truck me-2"></i>Driver Dashboard</h2>
    <span class="badge bg-secondary fs-6 fw-normal">Driver Role</span>
</div>

<div class="row g-4 mb-4">
    <div class="col-md-4">
        <div class="card text-white shadow-sm" style="background: linear-gradient(135deg, #0d47a1, #1565c0);">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-uppercase fw-bold mb-1 small opacity-75">Assigned Packages</p>
                        <h2 class="fw-bold mb-0">{{ assigned_packages }}</h2>
                    </div>
                    <i class="bi bi-boxes fs-1 opacity-50"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white shadow-sm" style="background: linear-gradient(135deg, #2e7d32, #43a047);">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-uppercase fw-bold mb-1 small opacity-75">Delivered</p>
                        <h2 class="fw-bold mb-0">{{ delivered_today }}</h2>
                    </div>
                    <i class="bi bi-check-circle fs-1 opacity-50"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-dark shadow-sm" style="background: linear-gradient(135deg, #f5b041, #f39c12);">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-uppercase fw-bold mb-1 small opacity-75">Role</p>
                        <h3 class="fw-bold mb-0">Driver</h3>
                    </div>
                    <i class="bi bi-person-badge fs-1 opacity-50"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-header bg-white py-3">
        <h5 class="mb-0 fw-bold"><i class="bi bi-lightning-charge me-2 text-accent"></i>Quick Actions</h5>
    </div>
    <div class="card-body p-4 d-flex flex-wrap gap-2">
        <a href="{% url 'package_list' %}" class="btn btn-primary"><i class="bi bi-box-seam me-1"></i> View Packages</a>
        <a href="{% url 'tracking_create' %}" class="btn btn-success"><i class="bi bi-geo-alt me-1"></i> Update Location</a>
    </div>
</div>
{% endblock %}
