{% extends 'base.html' %}
{% block title %}Confirm Deletion{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4 border-top border-danger border-5">
            <div class="card-body p-5 text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger mb-4" style="font-size: 4rem;"></i>
                <h3 class="fw-bold mb-3">Delete Confirmation</h3>
                <p class="text-muted lead mb-4">Are you sure you want to delete this record? This action cannot be undone.</p>
                <div class="p-3 bg-light rounded-3 mb-4 fw-bold text-dark">
                    {{ object }}
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{{ cancel_url }}" class="btn btn-light px-4 py-2 text-muted fw-bold">Cancel</a>
                        <button type="submit" class="btn btn-danger px-5 py-2 fw-bold">Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
