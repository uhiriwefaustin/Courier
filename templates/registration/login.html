{% extends 'base.html' %}

{% block title %}Login - Rwandan Local Courier Service{% endblock %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-primary-custom text-white text-center py-4 border-0">
                <i class="bi bi-box-seam mb-2" style="font-size: 2rem; color: var(--accent-color);"></i>
                <h4 class="mb-0 fw-bold">System Login</h4>
            </div>
            <div class="card-body p-4 p-md-5">
                {% if form.errors %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username or password.
                </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="id_username" class="form-label text-muted fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="username" autofocus class="form-control border-start-0" required id="id_username" placeholder="Enter username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label text-muted fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control border-start-0" required id="id_password" placeholder="Enter password">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-accent w-100 py-2 fw-bold text-uppercase mt-2">
                        Sign In <i class="bi bi-box-arrow-in-right ms-1"></i>
                    </button>
                    <input type="hidden" name="next" value="{{ next }}">
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
